                <div class="collapse navbar-collapse" id="navbarNav">
        
                    <ul class="navbar-nav mx-auto">

    <main class="container my-5">

        <section class="text-center mb-4">
            <h1>طلب استشارة برمجية</h1>

            <p>
                يمكنك تعبئة النموذج التالي لإرسال استشارة برمجية.
            </p>
        </section>

        <section>

            <form onsubmit="return validateForm()">

                <div class="mb-3">
                    <label class="form-label">
                        الاسم الكامل
                    </label>

                    <input type="text"
                           id="name"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        البريد الإلكتروني
                    </label>

                    <input type="email"
                           id="email"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        موضوع الاستشارة
                    </label>

                    <input type="text"
                           id="subject"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        الرسالة
                    </label>

                    <textarea id="message"
                              class="form-control"
                              rows="5"></textarea>
                </div>

                <button type="submit"
                        class="btn btn-primary">
                    إرسال
                </button>

            </form>

        </section>

    </main>

    <footer class="bg-light text-center p-3 mt-5">
