                    <ul class="navbar-nav mx-auto">

    </header>

    <main class="container my-5">

        <section class="text-center mb-5">
            <h1>معرض المنتجات التقنية</h1>

            <h4>
                عدد المنتجات في السلة:
                <span id="cartCount">0</span>
            </h4>
        </section>

        <section>

            <div class="row g-4">

                <!-- Laptop -->

                <div class="col-md-6 col-lg-3">
                    <div class="card h-100">
                        <img src="images/laptop.jpg"
                             class="card-img-top"
                             alt="Laptop">

                        <div class="card-body text-center">
                            <h5>Dell Inspiron Laptop</h5>
                            <p>$800</p>

                            <button class="btn btn-primary"
                                    onclick="addToCart()">
                                إضافة إلى السلة
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Keyboard -->

                <div class="col-md-6 col-lg-3">
                    <div class="card h-100">
                        <img src="images/keyboard.jpg"
                             class="card-img-top"
                             alt="Keyboard">

                        <div class="card-body text-center">
                            <h5>Mechanical Keyboard</h5>
                            <p>$60</p>

                            <button class="btn btn-primary"
                                    onclick="addToCart()">
                                إضافة إلى السلة
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Mouse -->

                <div class="col-md-6 col-lg-3">
                    <div class="card h-100">
                        <img src="images/mouse.jpg"
                             class="card-img-top"
                             alt="Mouse">

                        <div class="card-body text-center">
                            <h5>Wireless Mouse</h5>
                            <p>$25</p>

                            <button class="btn btn-primary"
                                    onclick="addToCart()">
                                إضافة إلى السلة
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Headset -->

                <div class="col-md-6 col-lg-3">
                    <div class="card h-100">
                        <img src="images/headset.jpg"
                             class="card-img-top"
                             alt="Headset">

                        <div class="card-body text-center">
                            <h5>Headset</h5>
                            <p>$40</p>

                            <button class="btn btn-primary"
                                    onclick="addToCart()">
                                إضافة إلى السلة
                            </button>
                        </div>
                    </div>
                </div>

            </div>

        </section>
